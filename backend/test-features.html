<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Synthesis Engine</title>
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet">
  <style>
    :root {
      --bg: #0f1115;
      --card-bg: #1a1d24;
      --card-hover: #232730;
      --text: #f3f4f6;
      --text-muted: #9ca3af;
      --primary: #6366f1;
      --primary-hover: #4f46e5;
      --border: rgba(255, 255, 255, 0.1);
      
      /* Brands */
      --github: #2ea043;
      --hn: #ff6600;
      --so: #f48024;
      --lc: #ffa116;
      --nasa: #3b82f6;
    }

    * { box-sizing: border-box; }
    
    body {
      font-family: 'Inter', sans-serif;
      margin: 0;
      padding: 0;
      background-color: var(--bg);
      color: var(--text);
      -webkit-font-smoothing: antialiased;
    }

    /* Header */
    header {
      position: sticky;
      top: 0;
      z-index: 100;
      background: rgba(15, 17, 21, 0.8);
      backdrop-filter: blur(12px);
      border-bottom: 1px solid var(--border);
      padding: 1rem 2rem;
      display: flex;
      justify-content: space-between;
      align-items: center;
    }
    .logo {
      font-size: 1.25rem;
      font-weight: 700;
      background: linear-gradient(to right, #818cf8, #c084fc);
      -webkit-background-clip: text;
      color: transparent;
    }
    .auth-area {
      display: flex;
      gap: 1rem;
      align-items: center;
    }
    .btn {
      background: var(--primary);
      color: white;
      border: none;
      padding: 0.5rem 1rem;
      border-radius: 6px;
      font-weight: 500;
      cursor: pointer;
      font-family: inherit;
      transition: all 0.2s;
    }
    .btn:hover { background: var(--primary-hover); }
    .btn.outline {
      background: transparent;
      border: 1px solid var(--border);
    }
    .btn.outline:hover { background: rgba(255,255,255,0.05); }

    /* Layout */
    .container {
      max-width: 1200px;
      margin: 0 auto;
      padding: 2rem;
      display: grid;
      grid-template-columns: 240px 1fr;
      gap: 2rem;
    }
    
    @media (max-width: 768px) {
      .container { grid-template-columns: 1fr; padding: 1rem; }
    }

    /* Sidebar */
    .sidebar h3 {
      font-size: 0.875rem;
      text-transform: uppercase;
      letter-spacing: 0.05em;
      color: var(--text-muted);
      margin-bottom: 1rem;
    }
    .category-list {
      list-style: none;
      padding: 0;
      margin: 0;
    }
    .category-list li {
      padding: 0.75rem 1rem;
      margin-bottom: 0.25rem;
      border-radius: 6px;
      cursor: pointer;
      color: var(--text-muted);
      transition: all 0.2s;
    }
    .category-list li:hover {
      background: rgba(255,255,255,0.05);
      color: var(--text);
    }
    .category-list li.active {
      background: rgba(99, 102, 241, 0.1);
      color: var(--primary);
      font-weight: 500;
    }

    /* Feed Grid */
    .feed-header {
      display: flex;
      justify-content: space-between;
      align-items: center;
      margin-bottom: 2rem;
    }
    .feed-grid {
      display: grid;
      grid-template-columns: repeat(auto-fill, minmax(300px, 1fr));
      gap: 1.5rem;
    }

    /* Card */
    .card {
      background: var(--card-bg);
      border: 1px solid var(--border);
      border-radius: 12px;
      overflow: hidden;
      display: flex;
      flex-direction: column;
      transition: transform 0.2s, border-color 0.2s;
      cursor: pointer;
      text-decoration: none;
      color: inherit;
    }
    .card:hover {
      transform: translateY(-4px);
      border-color: rgba(255,255,255,0.2);
    }
    .card-img {
      width: 100%;
      height: 160px;
      object-fit: cover;
      background: #2a2e37;
    }
    .card-content {
      padding: 1.25rem;
      flex: 1;
      display: flex;
      flex-direction: column;
    }
    .card-tag {
      display: inline-block;
      font-size: 0.75rem;
      font-weight: 600;
      padding: 0.25rem 0.5rem;
      border-radius: 4px;
      margin-bottom: 0.75rem;
      text-transform: uppercase;
    }
    .card-title {
      font-size: 1.1rem;
      font-weight: 600;
      margin: 0 0 0.5rem 0;
      line-height: 1.4;
    }
    .card-desc {
      font-size: 0.875rem;
      color: var(--text-muted);
      margin: 0 0 1rem 0;
      line-height: 1.5;
      display: -webkit-box;
      -webkit-line-clamp: 3;
      -webkit-box-orient: vertical;
      overflow: hidden;
    }
    .card-meta {
      margin-top: auto;
      display: flex;
      gap: 1rem;
      font-size: 0.8rem;
      color: var(--text-muted);
    }
    .meta-item { display: flex; align-items: center; gap: 0.25rem; }

    /* Modals */
    .modal-overlay {
      position: fixed;
      inset: 0;
      background: rgba(0,0,0,0.7);
      backdrop-filter: blur(4px);
      display: flex;
      justify-content: center;
      align-items: center;
      z-index: 1000;
      opacity: 0;
      pointer-events: none;
      transition: opacity 0.2s;
    }
    .modal-overlay.active {
      opacity: 1;
      pointer-events: auto;
    }
    .modal {
      background: var(--card-bg);
      border: 1px solid var(--border);
      padding: 2rem;
      border-radius: 12px;
      width: 100%;
      max-width: 400px;
      transform: scale(0.95);
      transition: transform 0.2s;
    }
    .modal-overlay.active .modal { transform: scale(1); }
    .modal h2 { margin-top: 0; }
    .input-group { margin-bottom: 1rem; }
    .input-group label {
      display: block;
      font-size: 0.875rem;
      margin-bottom: 0.5rem;
      color: var(--text-muted);
    }
    .input-group input {
      width: 100%;
      background: rgba(255,255,255,0.05);
      border: 1px solid var(--border);
      color: white;
      padding: 0.75rem;
      border-radius: 6px;
      font-family: inherit;
    }
    .input-group input:focus {
      outline: none;
      border-color: var(--primary);
    }
    .error-msg {
      color: #ef4444;
      font-size: 0.875rem;
      margin-bottom: 1rem;
      display: none;
    }

    /* Loaders */
    .loader {
      display: none;
      text-align: center;
      padding: 3rem;
      color: var(--text-muted);
    }
    .loader.active { display: block; }
  </style>
</head>
<body>

  <header>
    <div class="logo">Synthesis Engine</div>
    <div class="auth-area" id="auth-area">
      <!-- Injected via JS -->
    </div>
  </header>

  <div class="container">
    <aside class="sidebar">
      <h3>Categories</h3>
      <ul class="category-list" id="category-list">
        <li class="active" onclick="setCategory('all')">All Features</li>
        <li onclick="setCategory('space')">Space & NASA</li>
        <li onclick="setCategory('programming')">Programming</li>
        <li onclick="setCategory('startups')">Startups & HN</li>
        <li onclick="setCategory('ai')">Artificial Intelligence</li>
        <li onclick="setCategory('science')">Science</li>
      </ul>
    </aside>

    <main>
      <div class="feed-header">
        <h2 style="margin:0" id="feed-title">Latest Updates</h2>
        <div>
          <button class="btn outline" style="margin-right: 0.5rem; color: var(--success);" onclick="triggerSync()" id="sync-btn">Force Sync DB</button>
          <button class="btn outline" onclick="fetchFeed(true)">Refresh Feed</button>
        </div>
      </div>

      <div class="loader" id="loader">Loading intelligence...</div>
      <div class="feed-grid" id="feed-grid"></div>
    </main>
  </div>

  <!-- Auth Modal -->
  <div class="modal-overlay" id="auth-modal">
    <div class="modal">
      <h2 id="modal-title">Login</h2>
      <div class="error-msg" id="auth-error"></div>
      
      <div class="input-group" id="username-group" style="display: none;">
        <label>Username</label>
        <input type="text" id="username-input" placeholder="johndoe">
      </div>
      <div class="input-group">
        <label>Email</label>
        <input type="email" id="email-input" placeholder="john@example.com">
      </div>
      <div class="input-group">
        <label>Password</label>
        <input type="password" id="password-input" placeholder="••••••••">
      </div>

      <button class="btn" style="width: 100%; margin-top: 1rem;" onclick="submitAuth()" id="submit-btn">Login</button>
      <p style="text-align: center; font-size: 0.875rem; margin-top: 1rem; color: var(--text-muted); cursor: pointer;" onclick="toggleAuthMode()">
        Switch to <span id="switch-mode-text">Register</span>
      </p>
      <button class="btn outline" style="width: 100%; margin-top: 0.5rem;" onclick="closeModal()">Cancel</button>
    </div>
  </div>

  <script>
    const API = 'http://localhost:4000/api';
    let currentCategory = 'all';
    let isRegistering = false;
    let currentUser = null;

    // --- INIT ---
    async function init() {
      const token = localStorage.getItem('token');
      if (token) {
        await fetchUser(token);
      }
      renderAuthArea();
      fetchFeed();
    }

    // --- AUTH ---
    async function fetchUser(token) {
      try {
        const res = await fetch(`${API}/auth/me`, {
          headers: { 'Authorization': `Bearer ${token}` }
        });
        if (res.ok) {
          const data = await res.json();
          currentUser = data.user;
        } else {
          localStorage.removeItem('token');
        }
      } catch (e) {
        console.error('Auth error', e);
      }
    }

    function renderAuthArea() {
      const el = document.getElementById('auth-area');
      if (currentUser) {
        el.innerHTML = `
          <span style="font-size: 0.875rem; color: var(--text-muted);">@${currentUser.username}</span>
          <button class="btn outline" onclick="logout()">Logout</button>
        `;
      } else {
        el.innerHTML = `
          <button class="btn outline" onclick="openModal(false)">Login</button>
          <button class="btn" onclick="openModal(true)">Register</button>
        `;
      }
    }

    function logout() {
      localStorage.removeItem('token');
      currentUser = null;
      renderAuthArea();
    }

    // --- MODAL ---
    function openModal(register) {
      isRegistering = register;
      document.getElementById('auth-modal').classList.add('active');
      updateModalUI();
    }

    function closeModal() {
      document.getElementById('auth-modal').classList.remove('active');
      document.getElementById('auth-error').style.display = 'none';
    }

    function toggleAuthMode() {
      isRegistering = !isRegistering;
      updateModalUI();
    }

    function updateModalUI() {
      document.getElementById('modal-title').innerText = isRegistering ? 'Create Account' : 'Welcome Back';
      document.getElementById('username-group').style.display = isRegistering ? 'block' : 'none';
      document.getElementById('submit-btn').innerText = isRegistering ? 'Register' : 'Login';
      document.getElementById('switch-mode-text').innerText = isRegistering ? 'Login' : 'Register';
    }

    async function submitAuth() {
      const email = document.getElementById('email-input').value;
      const password = document.getElementById('password-input').value;
      const username = document.getElementById('username-input').value;
      const errorEl = document.getElementById('auth-error');
      
      const endpoint = isRegistering ? '/auth/register' : '/auth/login';
      const body = isRegistering ? { email, password, username } : { email, password };

      try {
        const res = await fetch(`${API}${endpoint}`, {
          method: 'POST',
          headers: { 'Content-Type': 'application/json' },
          body: JSON.stringify(body)
        });
        const data = await res.json();

        if (res.ok) {
          localStorage.setItem('token', data.token);
          currentUser = data.user;
          renderAuthArea();
          closeModal();
        } else {
          errorEl.innerText = data.error || 'Authentication failed';
          errorEl.style.display = 'block';
        }
      } catch (e) {
        errorEl.innerText = 'Network error';
        errorEl.style.display = 'block';
      }
    }

    // --- FEED ---
    function setCategory(cat) {
      currentCategory = cat;
      const lis = document.querySelectorAll('.category-list li');
      lis.forEach(li => li.classList.remove('active'));
      event.target.classList.add('active');

      const titles = {
        all: 'All Features', space: 'Space & NASA', programming: 'Programming', 
        startups: 'Startups', ai: 'Artificial Intelligence', science: 'Science'
      };
      document.getElementById('feed-title').innerText = titles[cat];
      fetchFeed(true);
    }

    async function fetchFeed(forceRefresh = false) {
      const grid = document.getElementById('feed-grid');
      const loader = document.getElementById('loader');
      
      if (forceRefresh) grid.innerHTML = '';
      loader.classList.add('active');

      try {
        const url = `${API}/feed?category=${currentCategory}&limit=12`;
        const res = await fetch(url);
        const data = await res.json();
        
        loader.classList.remove('active');
        renderCards(data.cards);
      } catch (e) {
        loader.classList.remove('active');
        grid.innerHTML = `<div style="grid-column: 1/-1; text-align: center; color: #ef4444;">Failed to load feed. Ensure backend is running.</div>`;
      }
    }

    function renderCards(cards) {
      const grid = document.getElementById('feed-grid');
      if (!cards || cards.length === 0) {
        grid.innerHTML = `<div style="grid-column: 1/-1; text-align: center; color: var(--text-muted);">No items found for this category.</div>`;
        return;
      }

      const html = cards.map(card => {
        let tagColor = 'var(--primary)';
        let statsHtml = '';

        if (card.type.startsWith('nasa')) tagColor = 'var(--nasa)';
        if (card.type === 'github') { tagColor = 'var(--github)'; statsHtml = `<span>★ ${card.metadata.stars}</span>`; }
        if (card.type === 'hackernews') { tagColor = 'var(--hn)'; statsHtml = `<span>↑ ${card.metadata.points}</span> <span>💬 ${card.metadata.comments}</span>`; }
        if (card.type === 'leetcode') { tagColor = 'var(--lc)'; statsHtml = `<span>${card.metadata.difficulty}</span>`; }
        if (card.type === 'stackoverflow') { tagColor = 'var(--so)'; statsHtml = `<span>Score: ${card.metadata.score}</span>`; }

        const title = card.title || 'Untitled';
        const desc = card.description || '';
        const img = card.imageUrl ? `<img src="${card.imageUrl}" class="card-img" alt="cover">` : '';
        
        return `
          <a href="${card.url || '#'}" target="_blank" class="card">
            ${img}
            <div class="card-content">
              <div>
                <span class="card-tag" style="background: ${tagColor}20; color: ${tagColor}; border: 1px solid ${tagColor}40;">
                  ${card.type.replace('_', ' ')}
                </span>
              </div>
              <h3 class="card-title">${title}</h3>
              <p class="card-desc">${desc}</p>
              
              <div class="card-meta">
                ${statsHtml}
                <span style="margin-left: auto;">${new Date(card.fetchedAt).toLocaleDateString()}</span>
              </div>
            </div>
          </a>
        `;
      }).join('');

      grid.innerHTML = html;
    }

    async function triggerSync() {
      const btn = document.getElementById('sync-btn');
      const originalText = btn.innerText;
      btn.innerText = 'Syncing... (takes 10s)';
      btn.disabled = true;

      try {
        const res = await fetch(`${API}/feed/sync`, { method: 'POST' });
        if (res.ok) {
          alert('Database successfully populated with latest items!');
          fetchFeed(true);
        } else {
          alert('Sync failed. Is the DB running?');
        }
      } catch(e) {
        alert('Network error while triggering sync.');
      } finally {
        btn.innerText = originalText;
        btn.disabled = false;
      }
    }

    // Run
    init();
  </script>
</body>
</html>
